services:
  # ── 模型推理服务（vLLM）──
  # 启动前请确认模型路径，或在 .env 中配置 MODEL_PATH
  vllm:
    image: vllm/vllm-openai:latest
    container_name: ethno-vllm
    env_file: .env
    ports:
      - "8001:8001"
    volumes:
      - ${MODEL_PATH:-./model}:/model:ro
    command: >
      --model /model/${PROFESSIONAL_MODEL_NAME:-deepseek-r1-7b}
      --served-model-name ${PROFESSIONAL_MODEL_NAME:-deepseek-r1-7b}
      --host 0.0.0.0
      --port 8001
      --dtype auto
      --max-model-len 4096
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
    networks:
      - ethno-med-ai-network
    restart: unless-stopped

  # ── 后端 API 服务 ──
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: ethno-med-ai-backend
    container_name: ethno-backend
    env_file: .env
    ports:
      - "8000:8000"
    environment:
      - LOCAL_MODEL_BASE_URL=http://vllm:8001/v1
    volumes:
      - ./rag/datasets:/app/rag/datasets:ro
      - ./rag/vector_store:/app/rag/vector_store:ro
    depends_on:
      - vllm
    networks:
      - ethno-med-ai-network
    restart: unless-stopped

  # ── 前端 ──
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: ethno-med-ai-frontend
    container_name: ethno-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
    depends_on:
      - backend
    networks:
      - ethno-med-ai-network
    restart: unless-stopped

networks:
  ethno-med-ai-network:
    driver: bridge