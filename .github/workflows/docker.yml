name: Docker Build

on:
  push:
    branches: [main]
    tags: ["v*"]

jobs:
  build-backend:
    name: Build Backend Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build backend image
        run: |
          docker build -t ethno-med-ai-backend:latest -f backend/Dockerfile .

  build-frontend:
    name: Build Frontend Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build frontend image
        run: |
          docker build -t ethno-med-ai-frontend:latest -f frontend/Dockerfile ./frontend
